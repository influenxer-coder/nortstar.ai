<!DOCTYPE html><html><head><meta charset='UTF-8'><style>*{margin:0;padding:0;box-sizing:border-box}:root{--bg:#0a0a0f;--surface:#13131a;--border:#1e1e2e;--accent:#6c63ff;--text:#f0f0f8;--muted:#6b6b8a}body{background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;min-height:100vh;display:flex;flex-direction:column;opacity:.55}nav{padding:20px 40px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}.logo{font-size:11px;letter-spacing:3px;color:var(--muted);font-weight:600}.removed-badge{background:#3a1a1a;border:1px solid #6b2a2a;color:#f87171;font-size:11px;padding:4px 12px;border-radius:20px;letter-spacing:1px}main{flex:1;display:flex;align-items:center;justify-content:center;padding:40px}.empty{text-align:center;max-width:400px}.icon{width:64px;height:64px;background:var(--surface);border:1px solid var(--border);border-radius:12px;margin:0 auto 24px;display:flex;align-items:center;justify-content:center;font-size:24px}h2{font-size:22px;font-weight:600;margin-bottom:10px}p{color:var(--muted);font-size:14px;line-height:1.7;margin-bottom:28px}.btn{background:var(--surface);color:var(--muted);border:1px solid var(--border);border-radius:8px;padding:12px 24px;font-size:13px;cursor:not-allowed}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:48px;max-width:700px}.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:24px;height:80px}</style></head><body><nav><span class='logo'>AGENT.NORTHSTAR</span><span class='removed-badge'>REMOVED SCREEN</span></nav><main><div style='width:100%;max-width:700px'><div class='empty'><div class='icon'>📋</div><h2>Your dashboard is empty</h2><p>Add your first roadmap item, connect your tools, or import feedback to get started.</p><button class='btn'>Explore features</button></div><div class='grid'><div class='card'></div><div class='card'></div><div class='card'></div></div></div></main></body></html>
