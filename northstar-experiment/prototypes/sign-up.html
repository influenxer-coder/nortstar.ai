<!DOCTYPE html><html><head><meta charset='UTF-8'><style>*{margin:0;padding:0;box-sizing:border-box}:root{--bg:#0a0a0f;--surface:#13131a;--border:#1e1e2e;--accent:#6c63ff;--text:#f0f0f8;--muted:#6b6b8a}body{background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;min-height:100vh;display:flex;flex-direction:column}nav{padding:20px 40px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}nav .logo{font-size:11px;letter-spacing:3px;color:var(--muted);font-weight:600}nav a{color:var(--muted);text-decoration:none;font-size:13px}main{flex:1;display:flex;align-items:center;justify-content:center;padding:40px}.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:48px;width:100%;max-width:420px}.eyebrow{font-size:10px;letter-spacing:3px;color:var(--accent);font-weight:700;margin-bottom:16px}h1{font-size:26px;font-weight:700;line-height:1.3;margin-bottom:8px}p{color:var(--muted);font-size:14px;margin-bottom:32px;line-height:1.6}label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px;letter-spacing:1px}input{width:100%;background:#0d0d14;border:1px solid var(--border);border-radius:8px;padding:12px 14px;color:var(--text);font-size:14px;margin-bottom:16px;outline:none;transition:border .2s}input:focus{border-color:var(--accent)}.btn{width:100%;background:var(--accent);color:#fff;border:none;border-radius:8px;padding:14px;font-size:14px;font-weight:600;cursor:pointer;letter-spacing:.5px;margin-top:8px}.sub{text-align:center;margin-top:20px;font-size:12px;color:var(--muted)}.sub a{color:var(--accent);text-decoration:none}.timer-badge{display:inline-flex;align-items:center;gap:6px;background:#1a1a2e;border:1px solid var(--border);border-radius:20px;padding:4px 10px;font-size:11px;color:var(--muted);margin-bottom:14px}.timer-badge span{color:#4ade80;font-weight:700}</style></head><body><nav><span class='logo'>AGENT.NORTHSTAR</span><a href='#'>How it works</a></nav><main><div class='card'><div class='eyebrow'>GET STARTED</div><div class='timer-badge'>⚡ <span>5 min</span> to your first experiment</div><h1>Start now</h1><p>NorthStar sets up your first experiment plan automatically — no PM expertise required.</p><label>EMAIL</label><input type='email' placeholder='you@startup.com'><label>PASSWORD</label><input type='password' placeholder='Create a password'><button class='btn'>Start experimenting →</button><div class='sub'>Already have an account? <a href='#'>Sign in</a></div></div></main></body></html>
